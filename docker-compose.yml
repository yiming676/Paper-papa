version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: study-assistant-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-study_assistant}
      POSTGRES_USER: ${POSTGRES_USER:-study_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-study_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-study_user} -d ${POSTGRES_DB:-study_assistant}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: study-assistant-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://study_user:study_password@db:5432/study_assistant}
    volumes:
      - ./backend/storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: study-assistant-frontend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
